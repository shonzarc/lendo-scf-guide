<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#090419;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
  padding-top:0px;
}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
</style>
</head>
<body>
<svg id="sv" width="680" height="490" viewBox="0 0 680 490" style="margin-top:-40px">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- outer ring -->
  <circle id="lim" cx="340" cy="245" r="130" fill="none" stroke="rgba(0,85,255,0.2)" stroke-width="1"/>
  <!-- progress arc -->
  <circle id="arc" cx="340" cy="245" r="130" fill="none" stroke="#0055FF" stroke-width="3.5" stroke-dasharray="817" stroke-dashoffset="817" stroke-linecap="round" transform="rotate(-90 340 245)"/>
  <!-- center circle -->
  <circle id="cn" cx="340" cy="245" r="80" fill="#0a0e24" stroke="rgba(0,85,255,0.35)" stroke-width="1"/>
  <text id="cl1" x="340" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" opacity="0">Program 1</text>
  <text id="cl2" x="340" y="248" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)" opacity="0">Buyer Org</text>
  <text id="cl3" x="340" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#0055FF" opacity="0">0% utilized</text>
  <g id="ls"></g>
  <g id="cs"></g>
</svg>

<script>
const SP=[
  {n:'Supplier 1',u:14,x:188,y:175},
  {n:'Supplier 2',u:12,x:320,y:88},
  {n:'Supplier 3',u:10,x:462,y:130},
  {n:'Supplier 4',u:16,x:514,y:278},
  {n:'Supplier 5',u:11,x:420,y:400},
  {n:'Supplier 6',u:10,x:222,y:395}
];
const CX=340,CY=245,CR=80,AC=817;
let tot=0,ts=[];
const NS='http://www.w3.org/2000/svg';
const q=id=>document.getElementById(id);
const sl=ms=>new Promise(r=>ts.push(setTimeout(r,ms)));

async function go(){
  ts.forEach(clearTimeout);ts=[];tot=0;
  q('ls').innerHTML='';q('cs').innerHTML='';
  ['lim','arc','cn','cl1','cl2','cl3'].forEach(id=>{
    const e=q(id);e.style.transition='none';e.setAttribute('opacity',0);
  });
  q('arc').setAttribute('stroke-dashoffset',AC);
  q('arc').setAttribute('stroke','#0055FF');
  q('cl3').textContent='0% utilized';
  q('cl3').setAttribute('fill','#0055FF');
  await sl(200);

  const fade=(id,d)=>{
    const e=q(id);
    e.style.transition=`opacity ${d}ms`;
    e.setAttribute('opacity',1);
  };
  fade('cn',400);await sl(200);
  fade('cl1',400);await sl(150);
  fade('cl2',400);await sl(150);
  fade('cl3',400);await sl(250);
  fade('lim',500);
  const a=q('arc');
  a.style.transition='opacity 400ms';
  a.setAttribute('opacity',1);
  await sl(700);

  for(let i=0;i<SP.length;i++){
    await addS(SP[i]);
    if(i<SP.length-1) await sl(680);
  }
  await sl(2200);
  go();
}

async function addS(s){
  const dx=s.x-CX,dy=s.y-CY,dist=Math.sqrt(dx*dx+dy*dy);
  const ex=CX+CR*dx/dist,ey=CY+CR*dy/dist;

  const l=document.createElementNS(NS,'line');
  l.setAttribute('x1',Math.round(ex));l.setAttribute('y1',Math.round(ey));
  l.setAttribute('x2',s.x);l.setAttribute('y2',s.y);
  l.setAttribute('stroke','rgba(0,85,255,0.3)');
  l.setAttribute('stroke-width','0.5');
  l.setAttribute('stroke-dasharray','3 3');
  l.setAttribute('opacity',0);
  l.style.transition='opacity 250ms';
  q('ls').appendChild(l);
  await sl(20);l.setAttribute('opacity',1);await sl(180);

  const cw=s.n.length*7+28,ch=28;
  const g=document.createElementNS(NS,'g');
  g.setAttribute('opacity',0);
  g.style.transition='opacity 300ms';

  const r=document.createElementNS(NS,'rect');
  r.setAttribute('x',s.x-cw/2);r.setAttribute('y',s.y-ch/2);
  r.setAttribute('width',cw);r.setAttribute('height',ch);r.setAttribute('rx',14);
  r.setAttribute('fill','#0a0e24');
  r.setAttribute('stroke','rgba(0,85,255,0.4)');r.setAttribute('stroke-width','1');

  const t=document.createElementNS(NS,'text');
  t.setAttribute('x',s.x);t.setAttribute('y',s.y);
  t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');
  t.setAttribute('font-size','11');t.setAttribute('fill','rgba(255,255,255,0.75)');
  t.textContent=s.n;

  const u=document.createElementNS(NS,'text');
  u.setAttribute('x',s.x);
  u.setAttribute('y',s.y+ch/2+13);
  u.setAttribute('text-anchor','middle');
  u.setAttribute('font-size','10');u.setAttribute('font-weight','600');
  u.setAttribute('fill','#4DE1FF');
  u.setAttribute('opacity',0);
  u.style.transition='opacity 350ms';
  u.textContent=s.u+'%';

  g.appendChild(r);g.appendChild(t);
  q('cs').appendChild(g);q('cs').appendChild(u);
  await sl(20);g.setAttribute('opacity',1);
  await sl(120);u.setAttribute('opacity',1);

  tot+=s.u;
  const a=q('arc');
  const high=tot>=73;
  a.style.transition='stroke-dashoffset 650ms ease,stroke 400ms';
  a.setAttribute('stroke-dashoffset',AC*(1-tot/100));
  a.setAttribute('stroke',high?'#FFB460':'#0055FF');
  q('cl3').textContent=tot+'% utilized';
  q('cl3').setAttribute('fill',high?'#FFB460':'#0055FF');
}

go();
</script>
</body>
</html>
