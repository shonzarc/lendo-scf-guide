<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090419;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;padding:32px 20px;overflow:hidden}
.tag{font-size:11px;letter-spacing:5px;color:#4DE1FF;text-transform:uppercase;margin-bottom:12px;font-family:'Courier New',monospace;text-align:center}
.heading{font-size:21px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px;text-align:center}
.sub{font-size:13px;color:#4a5e70;margin-bottom:20px;text-align:center;line-height:1.6}
canvas{display:block;border-radius:8px;border:1px solid #0e0c1e}
.legend{display:flex;gap:24px;justify-content:center;margin-top:14px}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:1px;color:#4a5e70;text-transform:uppercase;font-family:'Courier New',monospace}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.callout{text-align:center;opacity:0;transition:opacity 1s;margin-top:16px;min-height:48px}
.callout.show{opacity:1}
.callout-big{font-size:42px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1}
.callout-small{font-size:11px;color:#4a5e70;letter-spacing:3px;text-transform:uppercase;margin-top:6px}
</style>

<p class="tag">314 Features</p>
<h1 class="heading">Built from scratch. Star by star.</h1>
<p class="sub">Three portals. One platform. 314 distinct capabilities.</p>
<canvas id="c" width="560" height="320"></canvas>
<div class="legend">
  <div class="leg"><div class="dot" style="background:#0055FF"></div>Admin — 170</div>
  <div class="leg"><div class="dot" style="background:#4DE1FF"></div>Buyer — 90</div>
  <div class="leg"><div class="dot" style="background:#FFB460"></div>Supplier — 54</div>
</div>
<div class="callout" id="callout">
  <div class="callout-big">314</div>
  <div class="callout-small">features shipped · one platform</div>
</div>

<script>
(function(){
var W=560,H=320;
var cv=document.getElementById('c');
var ctx=cv.getContext('2d');

var P=[
  {name:'Admin',   n:170, col:'#0055FF', cx:145, cy:165, sp:105},
  {name:'Buyer',   n:90,  col:'#4DE1FF', cx:340, cy:110, sp:72},
  {name:'Supplier',n:54,  col:'#FFB460', cx:418, cy:228, sp:62},
];

var stars=[];
P.forEach(function(p){
  var added=0, tries=0;
  while(added<p.n && tries<p.n*30){
    tries++;
    var a=Math.random()*Math.PI*2;
    var r=Math.sqrt(Math.random())*p.sp;
    var x=p.cx+Math.cos(a)*r;
    var y=p.cy+Math.sin(a)*r;
    if(x>8&&x<W-8&&y>8&&y<H-8){
      stars.push({x:x,y:y,r:1.2+Math.random()*2,col:p.col,pname:p.name,
        cx:p.cx,cy:p.cy,sp:p.sp,
        phase:Math.random()*Math.PI*2,
        spd:0.002+Math.random()*0.004,
        vis:false});
      added++;
    }
  }
});

var conns=[];
for(var i=0;i<stars.length;i++){
  for(var j=i+1;j<stars.length;j++){
    if(stars[i].pname===stars[j].pname){
      var dx=stars[i].x-stars[j].x, dy=stars[i].y-stars[j].y;
      if(Math.sqrt(dx*dx+dy*dy)<26&&Math.random()<0.25) conns.push([i,j]);
    }
  }
}

var revIdx=0, done=false, calloutShown=false;

function reveal(){
  if(revIdx>=stars.length){ done=true; setTimeout(showEnd,800); return; }
  var b=revIdx<50?2:revIdx<150?4:revIdx<260?6:8;
  for(var i=0;i<b&&revIdx<stars.length;i++) stars[revIdx++].vis=true;
  setTimeout(reveal,30);
}

function showEnd(){
  calloutShown=true;
  document.getElementById('callout').className='callout show';
  setTimeout(restart,5000);
}

function restart(){
  calloutShown=false;
  done=false;
  revIdx=0;
  document.getElementById('callout').className='callout';
  stars.forEach(function(s){s.vis=false;});
  setTimeout(reveal,400);
}

function frame(){
  requestAnimationFrame(frame);
  var now=Date.now();
  ctx.fillStyle='#07060e';
  ctx.fillRect(0,0,W,H);

  conns.forEach(function(cn){
    var a=stars[cn[0]], b=stars[cn[1]];
    if(!a.vis||!b.vis) return;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=a.col; ctx.lineWidth=0.5; ctx.globalAlpha=0.1; ctx.stroke(); ctx.globalAlpha=1;
  });

  if(done){
    [[0,1],[1,2],[0,2]].forEach(function(lk){
      ctx.beginPath(); ctx.moveTo(P[lk[0]].cx,P[lk[0]].cy); ctx.lineTo(P[lk[1]].cx,P[lk[1]].cy);
      ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.globalAlpha=0.05;
      ctx.setLineDash([4,7]); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
    });
  }

  stars.forEach(function(s){
    if(!s.vis) return;
    var pulse=0.5+0.5*Math.sin(now*s.spd+s.phase);
    var tw=0.15+0.85*pulse;
    var rr=s.r*(0.5+0.8*pulse);
    ctx.beginPath(); ctx.arc(s.x,s.y,rr,0,Math.PI*2);
    ctx.fillStyle=s.col; ctx.globalAlpha=tw; ctx.fill(); ctx.globalAlpha=1;
    ctx.beginPath(); ctx.arc(s.x,s.y,rr*3.5,0,Math.PI*2);
    ctx.fillStyle=s.col; ctx.globalAlpha=tw*0.22; ctx.fill(); ctx.globalAlpha=1;
  });

  P.forEach(function(p){
    var cnt=stars.filter(function(s){return s.pname===p.name&&s.vis;}).length;
    ctx.globalAlpha=Math.min(1,cnt/15)*0.6;
    ctx.fillStyle=p.col; ctx.font='500 10px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(p.name.toUpperCase(),p.cx,p.cy+p.sp+16); ctx.globalAlpha=1;
  });
}

requestAnimationFrame(frame);
setTimeout(reveal,800);
})();
</script>
