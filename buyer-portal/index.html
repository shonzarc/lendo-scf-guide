<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#090419;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  padding:36px 20px 24px;
}
.row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  width:100%;
  max-width:720px;
}
.card{
  flex:1;
  background:#0a0e24;
  border:1px solid rgba(0,85,255,0.2);
  border-radius:14px;
  padding:20px 14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:9px;
  opacity:0;
  transform:translateY(14px);
  transition:opacity 0.5s, transform 0.5s;
}
.card.visible{opacity:0.55;transform:translateY(0);}
.card.active{
  opacity:1;
  border-color:rgba(0,85,255,0.7);
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{border-color:rgba(0,85,255,0.4);box-shadow:0 0 0 0 rgba(0,85,255,0);}
  50%{border-color:#4DE1FF;box-shadow:0 0 0 6px rgba(77,225,255,0.12);}
}
.card-icon{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,85,255,0.08);
  border:1px solid rgba(0,85,255,0.15);
}
.card.active .card-icon{
  background:rgba(0,85,255,0.18);
  border-color:rgba(0,85,255,0.45);
}
.icon-svg{width:17px;height:17px;opacity:0.4;}
.card.active .icon-svg{opacity:1;}
.card-name{
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,0.4);
  text-align:center;
}
.card.active .card-name{color:#fff;}
.card-desc{
  font-size:9px;
  color:rgba(255,255,255,0.2);
  text-align:center;
  line-height:1.6;
}
.card.active .card-desc{color:rgba(255,255,255,0.45);}
.pill{
  margin-top:2px;padding:3px 9px;
  border-radius:20px;font-size:8px;font-weight:600;letter-spacing:0.5px;
  text-transform:uppercase;
  background:rgba(0,85,255,0.15);color:#4DE1FF;border:1px solid rgba(77,225,255,0.3);
}
</style>
</head>
<body>
<div class="row">

  <div class="card" id="c-admin">
    <div class="card-icon">
      <svg class="icon-svg" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="2" width="14" height="14" rx="3" stroke="#0055FF" stroke-width="1.2"/>
        <path d="M5 9h8M5 6h5M5 12h3" stroke="#0055FF" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-name">Admin Panel</div>
    <div class="card-desc">Operations, approvals, full lifecycle</div>
  </div>

  <div class="card active" id="c-buyer">
    <div class="card-icon">
      <svg class="icon-svg" viewBox="0 0 18 18" fill="none">
        <path d="M2 16V7l7-4 7 4v9" stroke="#0055FF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="6" y="10" width="6" height="6" rx="1" stroke="#0055FF" stroke-width="1.2"/>
        <path d="M9 10v6" stroke="#0055FF" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-name">Buyer Portal</div>
    <div class="card-desc">Suppliers, invoices, payables, wallet</div>
    <div class="pill">You are here</div>
  </div>

  <div class="card" id="c-supplier">
    <div class="card-icon">
      <svg class="icon-svg" viewBox="0 0 18 18" fill="none">
        <path d="M3 13V8l6-4 6 4v5" stroke="#0055FF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="6" y="9" width="6" height="4" rx="1" stroke="#0055FF" stroke-width="1.2"/>
      </svg>
    </div>
    <div class="card-name">Supplier Portal</div>
    <div class="card-desc">Invoices, payment requests, wallet</div>
  </div>

  <div class="card" id="c-investor">
    <div class="card-icon">
      <svg class="icon-svg" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="7" stroke="#0055FF" stroke-width="1.2"/>
        <path d="M9 5v1m0 6v1M7 7.5A1.5 1.5 0 019 6.5h.5A1.5 1.5 0 0111 8v0a1.5 1.5 0 01-1.5 1.5h-1A1.5 1.5 0 007 11v0a1.5 1.5 0 001.5 1.5H9a1.5 1.5 0 001.5-1.5" stroke="#0055FF" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-name">Investor Portal</div>
    <div class="card-desc">Funding, limits, reporting</div>
  </div>

</div>

<script>
const sl=ms=>new Promise(r=>setTimeout(r,ms));
const all=[
  document.getElementById('c-admin'),
  document.getElementById('c-buyer'),
  document.getElementById('c-supplier'),
  document.getElementById('c-investor'),
];
all.forEach((c,i)=>setTimeout(()=>c.classList.add('visible'),200+i*120));
</script>
</body>
</html>
