<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#090419;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
  gap:22px;
  padding:32px 20px;
}
.scene{
  position:relative;
  width:300px;
  height:300px;
}
#cv{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:10;
}
.bb{
  position:absolute;
  left:90px;top:174px;
  width:120px;height:88px;
  background:#0c0630;
  border:1.5px solid #0055FF;
  border-top:none;
  border-radius:0 0 8px 8px;
  overflow:hidden;
}
.bb::before{
  content:'';
  position:absolute;
  left:53px;top:0;
  width:14px;height:100%;
  background:#0055FF;
  opacity:0.38;
}
.bb::after{
  content:'';
  position:absolute;
  left:0;top:37px;
  width:100%;height:14px;
  background:#0055FF;
  opacity:0.18;
}
.lg{
  position:absolute;
  left:86px;top:151px;
  width:128px;
}
.bw{
  position:absolute;
  top:-26px;
  left:44px;
  width:40px;height:26px;
}
.bl{
  position:relative;
  width:128px;height:23px;
  background:#0c0630;
  border:1.5px solid #0055FF;
  border-radius:4px 4px 0 0;
  overflow:hidden;
}
.bl::before{
  content:'';
  position:absolute;
  left:57px;top:0;
  width:14px;height:100%;
  background:#0055FF;
  opacity:0.38;
}
.scf{
  position:absolute;
  left:50%;top:184px;
  transform:translateX(-50%);
  font-size:42px;
  font-weight:700;
  letter-spacing:8px;
  color:#fff;
  white-space:nowrap;
  opacity:0;
  z-index:4;
}
.slbl{
  position:absolute;
  left:50%;top:240px;
  transform:translateX(-50%);
  font-size:8px;
  letter-spacing:3.5px;
  text-transform:uppercase;
  color:#4DE1FF;
  white-space:nowrap;
  opacity:0;
  z-index:4;
}
.bot{
  text-align:center;
  opacity:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.bot-t{
  font-size:10px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.3);
}
.pills{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  max-width:360px;
}
.pl{
  padding:4px 12px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  font-size:10px;
  color:rgba(255,255,255,0.32);
}
.pl.hi{
  border-color:#4DE1FF;
  color:#4DE1FF;
  font-weight:600;
}
@keyframes wobble{
  0%,100%{transform:translateY(0) rotate(0)}
  20%{transform:translateY(-7px) rotate(-3.5deg)}
  50%{transform:translateY(-4px) rotate(2.5deg)}
  80%{transform:translateY(-6px) rotate(-2deg)}
}
@keyframes fly{
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(-120px) translateX(-10px) rotate(-22deg);opacity:0}
}
@keyframes scfPop{
  0%{opacity:0;transform:translateX(-50%) translateY(20px) scale(0.68)}
  50%{opacity:1}
  100%{opacity:1;transform:translateX(-50%) translateY(-86px) scale(1)}
}
@keyframes lblPop{
  0%{opacity:0;transform:translateX(-50%) translateY(12px)}
  100%{opacity:0.82;transform:translateX(-50%) translateY(-84px)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<div class="scene">
  <canvas id="cv" width="300" height="300"></canvas>
  <div class="bb"></div>
  <div class="lg" id="lg">
    <svg class="bw" viewBox="0 0 40 26" fill="none">
      <ellipse cx="10" cy="13" rx="10" ry="6.5" fill="#4DE1FF" opacity="0.9" transform="rotate(-22 10 13)"/>
      <ellipse cx="30" cy="13" rx="10" ry="6.5" fill="#4DE1FF" opacity="0.9" transform="rotate(22 30 13)"/>
      <circle cx="20" cy="13" r="6" fill="#090419"/>
      <circle cx="20" cy="13" r="4" fill="#0055FF"/>
      <circle cx="20" cy="13" r="2.2" fill="#4DE1FF" opacity="0.65"/>
    </svg>
    <div class="bl"></div>
  </div>
  <div class="scf" id="scf">SCF</div>
  <div class="slbl" id="slbl">Supply Chain Financing</div>
</div>

<div class="bot" id="bot">
  <span class="bot-t">Now a recognized product type</span>
  <div class="pills">
    <span class="pl hi">SCF</span>
    <span class="pl">Invoice Financing</span>
    <span class="pl">Term Financing</span>
    <span class="pl">PO Financing</span>
    <span class="pl">Project Financing</span>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const lg = document.getElementById('lg');
const scf = document.getElementById('scf');
const slbl = document.getElementById('slbl');
const bot = document.getElementById('bot');
let pts = [], raf = null, ts = [];
const COLS = ['#0055FF','#4DE1FF','#3388ff','#ffffff','#88eeff'];
function burst(){
  for(let i=0;i<60;i++){
    const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*6;
    pts.push({x:150,y:174,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2.2,r:1.5+Math.random()*2.8,c:COLS[Math.floor(Math.random()*COLS.length)],l:1,d:0.01+Math.random()*0.018});
  }
  tick();
}
function tick(){
  ctx.clearRect(0,0,300,300);
  pts=pts.filter(p=>p.l>0);
  pts.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.l*p.l;ctx.fillStyle=p.c;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.l-=p.d;
  });
  if(pts.length) raf=requestAnimationFrame(tick);
}
function play(){
  ts.forEach(clearTimeout);ts=[];
  cancelAnimationFrame(raf);ctx.clearRect(0,0,300,300);pts=[];
  [lg,scf,slbl,bot].forEach(e=>e.style.cssText='');
  void document.body.offsetWidth;
  ts.push(setTimeout(()=>{lg.style.animation='wobble 0.46s ease-in-out 2';},600));
  ts.push(setTimeout(()=>{lg.style.animation='fly 0.42s cubic-bezier(0.55,0,1,0.55) forwards';burst();},1700));
  ts.push(setTimeout(()=>{scf.style.animation='scfPop 0.68s cubic-bezier(0.34,1.56,0.64,1) forwards';slbl.style.animation='lblPop 0.62s cubic-bezier(0.34,1.56,0.64,1) 0.06s forwards';},1920));
  ts.push(setTimeout(()=>{bot.style.animation='fadeUp 0.55s ease-out forwards';},2950));
  ts.push(setTimeout(play,5200));
}
play();
</script>
</body>
</html>
