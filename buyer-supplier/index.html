<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#090419;
  height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
  padding-top:48px;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  width:200px;
}

.card{
  width:200px;
  border-radius:16px;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
}
.card.in{
  animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.card-stripe{ height:4px; }
.card-body{
  background:#0a0e24;
  border:1px solid rgba(0,85,255,0.3);
  border-top:none;
  border-radius:0 0 16px 16px;
  padding:20px;
}
.card-icon{ font-size:24px; margin-bottom:12px; }
.card-role{
  font-size:14px;
  font-weight:700;
  color:#fff;
  letter-spacing:-0.2px;
}

.card-buyer .card-stripe{ background:linear-gradient(90deg,#0055FF,#4DE1FF); }
.card-buyer .card-body{ border-color:rgba(0,85,255,0.35); }
.card-supplier .card-stripe{ background:linear-gradient(90deg,#4DE1FF,#0055FF); }
.card-supplier .card-body{ border-color:rgba(77,225,255,0.3); }

.connector{
  width:2px;
  height:48px;
  position:relative;
  background:rgba(0,85,255,0.2);
  opacity:0;
}
.connector.in{ animation:fadeIn 0.4s ease-out 0.7s forwards; }

@keyframes cardIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0} to{opacity:1}
}
</style>
</head>
<body>

<div class="container">
  <div class="card card-buyer" id="c-buyer">
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="card-icon">🏢</div>
      <div class="card-role">Buyer Portal</div>
    </div>
  </div>

  <div class="connector" id="connector">
    <div id="dot" style="position:absolute;width:6px;height:6px;border-radius:50%;background:#4DE1FF;left:50%;transform:translateX(-50%);top:0;opacity:0;"></div>
  </div>

  <div class="card card-supplier" id="c-supplier">
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="card-icon">🏭</div>
      <div class="card-role">Supplier Portal</div>
    </div>
  </div>
</div>

<script>
setTimeout(()=> document.getElementById('c-buyer').classList.add('in'), 200);
setTimeout(()=> document.getElementById('c-supplier').classList.add('in'), 450);
setTimeout(()=>{
  document.getElementById('connector').classList.add('in');
  animateDot();
}, 700);

function animateDot(){
  const dot = document.getElementById('dot');
  const conn = document.getElementById('connector');
  const h = conn.offsetHeight;
  let start = null;
  const dur = 1600;
  function step(ts){
    if(!start) start = ts;
    const p = Math.min((ts-start)/dur, 1);
    dot.style.top = (p*h)+'px';
    dot.style.opacity = p<0.05?p/0.05:p>0.95?(1-p)/0.05:1;
    if(p<1){ requestAnimationFrame(step); }
    else{ setTimeout(animateDot, 400); }
  }
  requestAnimationFrame(step);
}
</script>
</body>
</html>
